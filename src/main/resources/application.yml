spring:
  datasource:
    url: jdbc:h2:file:./data/testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
server:
  error:
    whitelabel:
      enabled: false
  port: 8089

security:
  jwtExpirationInSeconds: 28800

access-token:
  public: src/main/resources/rsa/access-token-public.pem
  private: src/main/resources/rsa/access-token-private.pem